version: '3.8'

# ── Local development stack ────────────────────────────────────────────────────
# Usage:
#   docker compose up -d         # Start all services
#   docker compose logs -f       # Follow all logs
#   docker compose down          # Stop and remove containers

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task-ui
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8080/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

  analytics:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: task-analytics
    ports:
      - "5000:5000"
    environment:
      - TASK_API_URL=http://backend:8080/api
      - FLASK_DEBUG=false
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
