name: Artifacts — Sharing Files Between Jobs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install
        working-directory: ./frontend
      - run: npm run build
        working-directory: ./frontend

      - name: Upload built files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files        
          path: ./frontend/build   
          retention-days: 1     

  deploy:
    needs: build            
    runs-on: ubuntu-latest
    steps:
      - name: Download built files
        uses: actions/download-artifact@v4
        with:
          name: dist-files        
          path: ./dist            

      - name: Deploy the files
        run: |
          ls ./dist
