on:
  workflow_dispatch:        
    inputs:                 
      environment:
        description: 'Which environment to deploy to?'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4
      - run: |
          ls
          pwd

      - name: Upload built files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files       
          path: ./frontend   
          retention-days: 1       

  deploy:
    needs: build            
    runs-on: ubuntu-latest
    steps:
      - name: Download built files
        uses: actions/download-artifact@v4
        with:
          name: dist-files        
          path: ./dist            

      - name: Deploy the files
        run: |
          ls ./dist
