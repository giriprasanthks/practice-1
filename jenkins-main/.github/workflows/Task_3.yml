name: Node-Version

on:
  push:
    branches: 
      - main


jobs:
  Node-Setup-Version:
    runs-on: ubuntu-latest
    steps:
    - name: Download the repo code
      uses: actions/checkout@v4

    - name: Set up Node.js version 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Node Version checkout
      run: node --version    
