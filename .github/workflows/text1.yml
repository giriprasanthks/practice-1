name: Multi-Triggres

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:        
    inputs:                 
      environment:
        description: 'Which environment to deploy to?'
        required: true
        default: 'testing'
        type: choice
        options:
          - testing
          - product

jobs:
  Multi-Triggres:
    runs-on: ubuntu-latest
    steps:
      - name: creat a file
        run: touch file

      - name: List the Hidden Files
        run: ls -a

      - name: disk space 
        run: df -h
